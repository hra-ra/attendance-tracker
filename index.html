<!DOCTYPE html>
<html>
<head>
  <title>Attendance</title>
  <style>
    :root {
      --bg: #f7f6f8;
      --card: #ffffff;
      --text-primary: #2d2d2d;
      --text-secondary: #6e6e73;
      --accent: #e7c5d9;
      --accent-hover: #ddb2cc;
      --calendar-bg: #f2ecf3;
    }

    body.dark {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --text-primary: #ffffff;
      --text-secondary: #a1a1a6;
      --accent: #e7c5d9;
      --accent-hover: #ddb2cc;
      --calendar-bg: #3a3a3c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
    }

    h1 {
      text-align: center;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .toggle {
      display: block;
      margin: 0 auto 40px auto;
      background: none;
      border: 1px solid var(--text-secondary);
      border-radius: 999px;
      padding: 6px 14px;
      color: var(--text-primary);
      cursor: pointer;
    }

    .container {
      max-width: 720px;
      margin: auto;
    }

    .subject {
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
      position: relative;
      transition: background 0.3s ease;
    }

    .stats {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 8px 16px;
      margin-top: 12px;
      margin-right: 8px;
      font-size: 14px;
      background: var(--accent);
      transition: 150ms ease;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.97); }

    .delete-btn {
      position: absolute;
      right: 20px;
      top: 20px;
      background: #efefef;
      font-size: 12px;
    }

    body.dark .delete-btn {
      background: #3a3a3c;
      color: white;
    }

    .fab {
      position: fixed;
      right: 30px;
      bottom: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 22px;
      background: var(--accent);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    /* Modal Animation */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .modal.show {
      display: flex;
      opacity: 1;
    }

    .card {
      background: var(--card);
      width: 340px;
      padding: 28px;
      border-radius: 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      transform: scale(0.95);
      transition: transform 0.2s ease;
    }

    .modal.show .card {
      transform: scale(1);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #e6e6e6;
      font-size: 14px;
    }

    .checkbox-group {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .checkbox-row input {
      transform: scale(1.1);
      accent-color: var(--accent);
    }
    .confirm-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.confirm-modal.show{
  display:flex;
}

.confirm-card{
  background:var(--card);
  width:320px;
  padding:24px;
  border-radius:24px;
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
  animation:fadeIn 0.2s ease;
}

.confirm-title{
  font-weight:600;
  margin-bottom:8px;
}

.confirm-text{
  font-size:14px;
  color:var(--text-secondary);
  margin-bottom:18px;
}

.confirm-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

.cancel-btn{
  background:none;
  border:1px solid rgba(0,0,0,0.1);
}


body.dark .cancel-btn{
  border:1px solid rgba(255,255,255,0.2);
  color:white;
}

.danger-btn{
  background:rgba(0,0,0,0.08);
}

body.dark .danger-btn{
  background:rgba(255,255,255,0.1);
  color:white;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}
    /* Month navigation */
.month-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  margin-bottom:8px;
  padding:0 4px;
}

.month-label{
  font-weight:500;
}

.month-arrows{
  display:flex;
  gap:10px;
}

.month-arrows span{
  cursor:pointer;
  padding:4px 8px;
  border-radius:8px;
  transition:0.15s ease;
}

.month-arrows span:hover{
  background:rgba(0,0,0,0.05);
}

body.dark .month-arrows span:hover{
  background:rgba(255,255,255,0.08);
}

/* Calendar grid */
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  background:var(--calendar-bg);
  padding:8px;
  border-radius:14px;
}

/* Calendar day */
.day{
  position:relative;
  text-align:center;
  padding:6px 0;
  font-size:12px;
  border-radius:10px;
  transition:0.2s ease;
}

.day:hover{
  transform:scale(1.05);
  cursor:pointer;
}

/* Today ring */
.today{
  box-shadow:0 0 0 1.5px var(--accent);
}

/* Attendance states */
.present{
  background:rgba(231,197,217,0.5);
}

.absent{
  background:rgba(0,0,0,0.06);
}

body.dark .absent{
  background:rgba(255,255,255,0.1);
}

/* Minimal popover */
.popover{
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  display:none;
  gap:6px;
  padding:6px 8px;
  border-radius:999px;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.6);
}

body.dark .popover{
  background:rgba(40,40,42,0.6);
}

.popover button{
  background:none;
  border:1px solid rgba(0,0,0,0.1);
  padding:4px 8px;
  font-size:11px;
  border-radius:999px;
}

body.dark .popover button{
  border:1px solid rgba(255,255,255,0.2);
  color:white;
}

.day:hover .popover{
  display:flex;
}
.analytics{
  margin-top:14px;
}

.big-percent{
  font-size:28px;
  font-weight:600;
}

.percent-label{
  font-size:12px;
  color:var(--text-secondary);
  margin-bottom:8px;
}

.progress-bar{
  height:6px;
  background:rgba(0,0,0,0.06);
  border-radius:999px;
  overflow:hidden;
  margin-bottom:12px;
}

body.dark .progress-bar{
  background:rgba(255,255,255,0.08);
}

.progress-fill{
  height:100%;
  background:var(--accent);
  border-radius:999px;
}

.mini-stats{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:10px;
}

.mini-stats strong{
  font-size:14px;
}

.status-text{
  font-size:13px;
  font-weight:500;
  margin-bottom:4px;
}

.subtle-info{
  font-size:12px;
  color:var(--text-secondary);
}
.top-status-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
}

.streak-text{
  font-size:13px;
  font-weight:500;
}

.bunk-chip span{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  font-weight:500;
}

.safe{
  background:rgba(76,175,80,0.12);
  color:#2e7d32;
}

.warning{
  background:rgba(255,152,0,0.12);
  color:#e65100;
}

.danger{
  background:rgba(244,67,54,0.12);
  color:#b71c1c;
}

.neutral{
  background:rgba(0,0,0,0.05);
}

body.dark .neutral{
  background:rgba(255,255,255,0.1);
}
.ring-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:12px;
}

.ring-container{
  position:relative;
  width:100px;
  height:100px;
}

.ring-container svg{
  transform:rotate(-90deg);
}

.ring-bg{
  fill:none;
  stroke:rgba(0,0,0,0.06);
  stroke-width:8;
}

body.dark .ring-bg{
  stroke:rgba(255,255,255,0.08);
}

.ring-progress{
  fill:none;
  stroke-width:8;
  stroke-linecap:round;
  transition:stroke-dashoffset 0.4s ease;
}

.ring-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:18px;
  font-weight:600;
}

/* Color States */

.ring-high .ring-progress{
  stroke:#4caf50;
}

.ring-target .ring-progress{
  stroke:var(--accent);
}

.ring-mid .ring-progress{
  stroke:#ff9800;
}

.ring-low .ring-progress{
  stroke:#f44336;
}
  </style>
</head>
<body>

<h1>Attendance</h1>
<button class="toggle" onclick="toggleDark()">Toggle Dark Mode</button>

<div class="container" id="subjects"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="modal" onclick="outsideClick(event)">
  <div class="card" onclick="event.stopPropagation()">
    <h3>Add Subject</h3>
    <input id="subjectName" type="text" placeholder="Subject name" oninput="validateForm()">
    <div class="checkbox-group">
      <label class="checkbox-row"><input type="checkbox" value="Mon" onchange="validateForm()"> Mon</label>
      <label class="checkbox-row"><input type="checkbox" value="Tue" onchange="validateForm()"> Tue</label>
      <label class="checkbox-row"><input type="checkbox" value="Wed" onchange="validateForm()"> Wed</label>
      <label class="checkbox-row"><input type="checkbox" value="Thu" onchange="validateForm()"> Thu</label>
      <label class="checkbox-row"><input type="checkbox" value="Fri" onchange="validateForm()"> Fri</label>
    </div>
    <button id="addBtn" onclick="addSubject()" disabled style="width:100%; margin-top:16px;">Add</button>
  </div>
</div>

<script>
let deleteIndex = null;
let subjects = JSON.parse(localStorage.getItem("subjects")) || [];
const TARGET = 75;

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

const today = new Date();
const todayString = today.toISOString().split("T")[0];

/* ---------- Dark Mode Persistence ---------- */
if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark");
}

function toggleDark() {
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode",
    document.body.classList.contains("dark"));
}

/* ---------- Utilities ---------- */
function save() {
  localStorage.setItem("subjects", JSON.stringify(subjects));
}

function openModal() {
  document.getElementById("modal").classList.add("show");
}

function outsideClick(e) {
  if (e.target.id === "modal") {
    document.getElementById("modal").classList.remove("show");
  }
}

/* ---------- Validation ---------- */
function validateForm() {
  const name = document.getElementById("subjectName").value.trim();
  const checked = document.querySelectorAll(".checkbox-group input:checked");
  document.getElementById("addBtn").disabled = !(name && checked.length > 0);
}

/* ---------- Add Subject ---------- */
function addSubject() {
  const name = document.getElementById("subjectName").value.trim();
  const checked = document.querySelectorAll(".checkbox-group input:checked");
  const days = Array.from(checked).map(cb => cb.value);

  if (!name || days.length === 0) return;

  subjects.push({ name: name, days: days, attendance: {} });
  save();
  render();

  document.getElementById("subjectName").value="";
  checked.forEach(cb=>cb.checked=false);
  document.getElementById("addBtn").disabled=true;
  document.getElementById("modal").classList.remove("show");
}

/* ---------- Delete ---------- */
function deleteSubject(i){
  deleteIndex = i;
  document.getElementById("confirmModal").classList.add("show");
}

function closeConfirm(){
  deleteIndex = null;
  document.getElementById("confirmModal").classList.remove("show");
}

function confirmDelete(){
  if(deleteIndex !== null){
    subjects.splice(deleteIndex,1);
    save();
    render();
  }
  closeConfirm();
}

/* ---------- Attendance ---------- */
function markDate(index, dateStr, status) {
  if (status === "clear") {
    delete subjects[index].attendance[dateStr];
  } else {
    subjects[index].attendance[dateStr] = status;
  }
  save();
  render();
}

function stats(sub){
  let present=0,total=0;
  for(let d in sub.attendance){
    total++;
    if(sub.attendance[d]==="present") present++;
  }
  return {present,total};
}
function circularProgress(percent){
  const radius = 42;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (percent/100) * circumference;

  let colorClass = "ring-low";
  if(percent >= 85) colorClass = "ring-high";
  else if(percent >= 75) colorClass = "ring-target";
  else if(percent >= 60) colorClass = "ring-mid";

  return `
  <div class="ring-container ${colorClass}">
    <svg width="100" height="100">
      <circle class="ring-bg"
        cx="50" cy="50" r="${radius}" />
      <circle class="ring-progress"
        cx="50" cy="50" r="${radius}"
        stroke-dasharray="${circumference}"
        stroke-dashoffset="${offset}" />
    </svg>
    <div class="ring-text">${percent}%</div>
  </div>
  `;
}

/* ---------- Streak ---------- */
function streakText(sub){
  const dates = Object.keys(sub.attendance)
    .filter(d => sub.attendance[d]==="present")
    .sort()
    .reverse();

  if(dates.length===0) return "No streak";

  let streak=1;
  for(let i=1;i<dates.length;i++){
    const prev=new Date(dates[i-1]);
    const curr=new Date(dates[i]);
    const diff=(prev-curr)/(1000*60*60*24);
    if(diff===1) streak++;
    else break;
  }

  return streak+" Day Streak 🔥";
}

/* ---------- Safe Bunk Chip ---------- */
function safeBunkChip(sub){
  const s = stats(sub);
  if(s.total===0) return "<span class='neutral'>No Data</span>";

  const currentPercent = (s.present/s.total)*100;

  if(currentPercent < TARGET){
    return "<span class='danger'>Below Target</span>";
  }

  let canSkip=0;
  while((s.present/(s.total+canSkip))*100 >= TARGET){
    canSkip++;
  }

  canSkip = canSkip - 1;

  if(canSkip <= 0){
    return "<span class='warning'>No Safe Bunks</span>";
  }

  if(canSkip === 1){
    return "<span class='safe'>Safe to Skip 1 Class</span>";
  }

  return "<span class='safe'>Safe to Skip "+canSkip+" Classes</span>";
}

/* ---------- Month Navigation ---------- */
function changeMonth(offset){
  currentMonth+=offset;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  render();
}

/* ---------- Calendar ---------- */
function calendarView(sub,index){
  const firstDay=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();

  let html="";
  html+="<div class='month-nav'>";
  html+="<div class='month-label'>"+
    new Date(currentYear,currentMonth)
    .toLocaleString("en-us",{month:"long",year:"numeric"})+
    "</div>";
  html+="<div class='month-arrows'>";
  html+="<span onclick='changeMonth(-1)'>&lt;</span>";
  html+="<span onclick='changeMonth(1)'>&gt;</span>";
  html+="</div></div>";

  html+="<div class='calendar-grid'>";

  for(let i=0;i<firstDay;i++){
    html+="<div></div>";
  }

  for(let d=1;d<=daysInMonth;d++){
    const dateObj=new Date(currentYear,currentMonth,d);
    const dateStr=dateObj.toISOString().split("T")[0];
    const status=sub.attendance[dateStr];
    const dayShort=dateObj.toLocaleString("en-us",{weekday:"short"});
    const isClass=sub.days.includes(dayShort);
    const isToday=(dateStr===todayString);

    let classes="day";
    if(status==="present") classes+=" present";
    if(status==="absent") classes+=" absent";
    if(isToday) classes+=" today";

    html+="<div class='"+classes+"'>"+d;

    if(isClass){
      html+="<div class='popover'>";
      html+="<button onclick=\"markDate("+index+",'"+dateStr+"','present')\">P</button>";
      html+="<button onclick=\"markDate("+index+",'"+dateStr+"','absent')\">A</button>";
      html+="<button onclick=\"markDate("+index+",'"+dateStr+"','clear')\">✕</button>";
      html+="</div>";
    }

    html+="</div>";
  }

  html+="</div>";
  return html;
}

/* ---------- Render ---------- */
function render(){
  const container=document.getElementById("subjects");
  container.innerHTML="";

  subjects.forEach(function(sub,i){
    const s = stats(sub);
    const percent = s.total===0 ? 0 :
      ((s.present/s.total)*100).toFixed(1);

    const div=document.createElement("div");
    div.className="subject";

    div.innerHTML=
      "<button class='delete-btn' onclick='deleteSubject("+i+")'>Delete</button>"+

      "<div class='subject-header'>"+
        "<div class='subject-title'>"+sub.name+"</div>"+
        circularProgress(percent)+
      "</div>"+

      "<div class='header-divider'></div>"+

      "<div class='mini-stats'>"+
        "<div>Present<br><strong>"+s.present+"</strong></div>"+
        "<div>Absent<br><strong>"+(s.total-s.present)+"</strong></div>"+
        "<div>Total<br><strong>"+s.total+"</strong></div>"+
      "</div>"+

      "<div class='top-status-row'>"+
        "<div class='streak-text'>"+streakText(sub)+"</div>"+
        "<div class='bunk-chip'>"+safeBunkChip(sub)+"</div>"+
      "</div>"+

      "<div class='calendar-wrapper'>"+
        calendarView(sub,i)+
      "</div>";

    container.appendChild(div);
  });
}
render();
</script>
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-card">
    <div class="confirm-title">Delete subject?</div>
    <div class="confirm-text">
      This will permanently remove the subject and all attendance data.
    </div>
    <div class="confirm-actions">
      <button class="cancel-btn" onclick="closeConfirm()">Cancel</button>
      <button class="danger-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>
</body>
</html>
